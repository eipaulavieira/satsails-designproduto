<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Satsails — Confirmar PIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      min-height: 100vh;
      padding: 32px 0;
      font-family: 'Inter', sans-serif;
    }

    .phone-frame {
      width: 390px;
      height: 844px;
      background: #000;
      border-radius: 30px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 2px #2a2a2a, 0 40px 80px rgba(0,0,0,0.8);
    }

    /* Status bar */
    .status-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px 0;
    }

    .status-time {
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Nav back + title */
    .nav-back {
      height: 42px;
      display: flex;
      align-items: center;
      padding: 8px 16px;
    }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .back-btn:active { opacity: 0.6; }

    .nav-title {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
    }

    .nav-title h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fafdfe;
    }

    /* PIN dots */
    .pin-dots {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1.5px solid #444;
      background: transparent;
      transition: background 0.15s, border-color 0.15s;
    }

    .dot.filled {
      background: #fff;
      border-color: #fff;
    }

    .dot.error {
      background: #ff3b30;
      border-color: #ff3b30;
    }

    /* Main content */
    .main-content {
      position: absolute;
      top: 187px;
      left: 46px;
      width: 298px;
      display: flex;
      flex-direction: column;
      gap: 52px;
      align-items: center;
    }

    /* Numpad */
    .numpad {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }

    .numpad-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .key {
      flex: 1;
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid #000;
      background: transparent;
      border-radius: 4px;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .key:active { background: rgba(255,255,255,0.08); }

    .key span {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      user-select: none;
    }

    .key img {
      width: 18px;
      height: 18px;
      object-fit: contain;
    }

    /* Error message */
    .error-msg {
      position: absolute;
      top: 175px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: #ff3b30;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .error-msg.visible { opacity: 1; }

    /* CTA Button */
    .btn-cta {
      position: absolute;
      bottom: 58px;
      left: 50%;
      transform: translateX(-50%);
      width: 328px;
      height: 52px;
      background: #00c853;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #000;
      cursor: pointer;
      box-shadow: 0px 4px 5.5px rgba(0,0,0,0.25);
      transition: opacity 0.15s, transform 0.1s;
      opacity: 0.4;
      pointer-events: none;
    }

    .btn-cta.ready {
      opacity: 1;
      pointer-events: all;
    }

    .btn-cta:active { transform: translateX(-50%) scale(0.98); }

    @media (max-width: 500px) {
      body { background: #000; align-items: flex-start; }
      .phone-frame { width: 100%; height: 100vh; border-radius: 0; box-shadow: none; }
    }
  </style>
</head>
<body>

<a href="splash-screen.html" style="
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: #727272;
    text-decoration: none;
    letter-spacing: -0.2px;
    transition: color 0.15s;
  " onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#727272'">
  ← Recomeçar fluxo
</a>

<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="7" width="3" height="5" rx="0.5" fill="white"/>
        <rect x="4.5" y="5" width="3" height="7" rx="0.5" fill="white"/>
        <rect x="9" y="2.5" width="3" height="9.5" rx="0.5" fill="white"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="white" opacity="0.35"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z" fill="white"/>
        <path d="M8 6.5c1.657 0 3.143.69 4.218 1.782L13.28 7.22A7.46 7.46 0 0 0 8 5a7.46 7.46 0 0 0-5.28 2.22l1.062 1.062A5.46 5.46 0 0 1 8 6.5z" fill="white"/>
        <path d="M8 3c2.756 0 5.243 1.06 7.1 2.82l1.04-1.04A10.46 10.46 0 0 0 8 1.5 10.46 10.46 0 0 0-.14 4.78L.9 5.82A8.46 8.46 0 0 1 8 3z" fill="white" opacity="0.5"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" stroke-opacity="0.35"/>
        <rect x="22.5" y="3.5" width="1" height="5" rx="0.5" fill="white" fill-opacity="0.4"/>
        <rect x="2" y="2" width="17" height="8" rx="2" fill="white"/>
      </svg>
    </div>
  </div>

  <!-- Nav back -->
  <div class="nav-back">
    <button class="back-btn" onclick="history.back()">
      <svg width="10" height="18" viewBox="0 0 10 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 1L1 9l8 8" stroke="#fafdfe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- Nav title -->
  <div class="nav-title">
    <h1>Confirmar o seu PIN</h1>
  </div>

  <!-- Error message -->
  <p class="error-msg" id="errorMsg">PINs não coincidem. Tente novamente.</p>

  <!-- Main content -->
  <div class="main-content">

    <!-- PIN dots -->
    <div class="pin-dots" id="pinDots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
      <div class="dot" id="d4"></div>
      <div class="dot" id="d5"></div>
    </div>

    <!-- Numpad -->
    <div class="numpad">
      <div class="numpad-row">
        <button class="key" onclick="pressKey('1')"><span>1</span></button>
        <button class="key" onclick="pressKey('2')"><span>2</span></button>
        <button class="key" onclick="pressKey('3')"><span>3</span></button>
      </div>
      <div class="numpad-row">
        <button class="key" onclick="pressKey('4')"><span>4</span></button>
        <button class="key" onclick="pressKey('5')"><span>5</span></button>
        <button class="key" onclick="pressKey('6')"><span>6</span></button>
      </div>
      <div class="numpad-row">
        <button class="key" onclick="pressKey('7')"><span>7</span></button>
        <button class="key" onclick="pressKey('8')"><span>8</span></button>
        <button class="key" onclick="pressKey('9')"><span>9</span></button>
      </div>
      <div class="numpad-row">
        <button class="key" onclick="pressFingerprint()">
          <img src="https://www.figma.com/api/mcp/asset/fd3467bd-ea1d-4e61-81ee-d9da1b3415b9" alt="biometria" />
        </button>
        <button class="key" onclick="pressKey('0')"><span>0</span></button>
        <button class="key" onclick="pressBackspace()">
          <svg width="18" height="14" viewBox="0 0 24 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 1L1 9l8 8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M1 9h22" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <!-- CTA -->
  <button class="btn-cta" id="btnConfirm" onclick="confirmPin()">Definir PIN</button>

</div>

<script>
  let pin = [];
  const originalPin = sessionStorage.getItem('pin') || '';

  function updateDots() {
    for (let i = 0; i < 6; i++) {
      const dot = document.getElementById('d' + i);
      dot.classList.remove('error');
      dot.classList.toggle('filled', i < pin.length);
    }
    document.getElementById('errorMsg').classList.remove('visible');
    const btn = document.getElementById('btnConfirm');
    btn.classList.toggle('ready', pin.length === 6);
  }

  function pressKey(digit) {
    if (pin.length < 6) {
      pin.push(digit);
      updateDots();
    }
  }

  function pressBackspace() {
    if (pin.length > 0) {
      pin.pop();
      updateDots();
    }
  }

  function pressFingerprint() {
    // placeholder para biometria
  }

  function confirmPin() {
    if (pin.length !== 6) return;

    if (originalPin && pin.join('') !== originalPin) {
      for (let i = 0; i < 6; i++) {
        document.getElementById('d' + i).classList.add('error');
        document.getElementById('d' + i).classList.remove('filled');
      }
      document.getElementById('errorMsg').classList.add('visible');
      pin = [];
      document.getElementById('btnConfirm').classList.remove('ready');
      return;
    }

    sessionStorage.removeItem('pin');
    alert('PIN definido com sucesso!');
  }
</script>


</body>
</html>
