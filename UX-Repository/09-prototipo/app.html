<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Satsails</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      min-height: 100vh;
      padding: 32px 0;
      font-family: 'Inter', sans-serif;
    }

    /* ── Phone frame ── */
    .phone-frame {
      width: 390px;
      height: 844px;
      border-radius: 30px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 2px #2a2a2a, 0 40px 80px rgba(0,0,0,0.8);
      background: #0c0b0d;
    }

    /* ── Screens ── */
    .screen {
      position: absolute;
      inset: 0;
      overflow: hidden;
      transform: translateX(100%);
      transition: transform 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }

    .screen.active   { transform: translateX(0); }
    .screen.exit-left { transform: translateX(-28%); }

    /* ── Status bar (compartilhada) ── */
    .status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px 0;
      z-index: 10;
    }

    .status-time { font-size: 15px; font-weight: 500; color: #fff; letter-spacing: -0.3px; }
    .status-icons { display: flex; align-items: center; gap: 6px; }

    /* ════════════════════════
       SPLASH
    ════════════════════════ */
    #splash { background: #0c0b0d; display: flex; align-items: center; justify-content: center; }

    .splash-logo {
      width: 200px;
      height: 200px;
      opacity: 0;
      animation: logoIn 0.7s 0.2s ease forwards;
    }

    @keyframes logoIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ════════════════════════
       LOGIN
    ════════════════════════ */
    #login { background: #080808; }

    .hero-image {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 540px;
      background-image: url('https://www.figma.com/api/mcp/asset/bd66874d-60ef-4b55-a929-46029de988f3');
      background-size: cover;
      background-position: center top;
    }

    .hero-image::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 200px;
      background: linear-gradient(to bottom, transparent, #080808);
    }

    .login-content {
      position: absolute;
      bottom: 16px; left: 31px; right: 31px;
      display: flex;
      flex-direction: column;
      gap: 68px;
      align-items: center;
    }

    .login-section { display: flex; flex-direction: column; gap: 24px; width: 100%; }

    .text-section { display: flex; flex-direction: column; gap: 8px; text-align: center; }

    .headline {
      font-size: 48px; font-weight: 500; color: #fff;
      letter-spacing: -1.92px; line-height: 1.1;
    }

    .subtitle {
      font-size: 24px; font-weight: 300; color: #727272;
      letter-spacing: -0.96px; line-height: 1.1;
    }

    .buttons-container { display: flex; flex-direction: column; gap: 8px; width: 100%; }

    .btn {
      width: 100%; height: 52px; border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; border: none;
      box-shadow: 0 4px 11px rgba(0,0,0,0.25);
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: -0.2px;
    }

    .btn:active { opacity: 0.85; transform: scale(0.98); }
    .btn-primary { background: #FF9800; color: #000; }
    .btn-secondary { background: #080808; color: #fff; border: 1px solid #333; }

    .terms-text {
      font-size: 8px; color: #727272;
      text-align: center; line-height: 1.5; width: 163px;
    }

    .terms-text strong { color: #fff; font-weight: 500; }

    /* ════════════════════════
       PIN SCREENS
    ════════════════════════ */
    #criar-pin,
    #confirmar-pin { background: #000; }

    .nav-title-bar {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      margin-top: 44px;
      position: relative;
    }

    .nav-title-bar h2 { font-size: 18px; font-weight: 700; color: #fafdfe; }

    .back-btn {
      position: absolute; left: 16px;
      background: none; border: none; cursor: pointer;
      padding: 4px; display: flex; align-items: center;
      -webkit-tap-highlight-color: transparent;
    }

    .back-btn:active { opacity: 0.5; }

    .pin-main {
      position: absolute;
      top: 187px; left: 46px;
      width: 298px;
      display: flex; flex-direction: column;
      gap: 52px; align-items: center;
    }

    .pin-dots { display: flex; gap: 12px; align-items: center; }

    .dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 1.5px solid #444;
      background: transparent;
      transition: background 0.15s, border-color 0.15s;
    }

    .dot.filled { background: #fff; border-color: #fff; }
    .dot.error  { background: #ff3b30; border-color: #ff3b30; }

    .numpad { display: flex; flex-direction: column; gap: 16px; width: 100%; }
    .numpad-row { display: flex; gap: 8px; }

    .key {
      flex: 1; height: 76px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border: 1px solid #000;
      background: transparent;
      border-radius: 4px;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .key:active { background: rgba(255,255,255,0.08); }
    .key span { font-size: 18px; font-weight: 700; color: #fff; user-select: none; }
    .key img { width: 18px; height: 18px; object-fit: contain; }

    .error-msg {
      position: absolute;
      top: 175px; left: 0; right: 0;
      text-align: center; font-size: 12px; color: #ff3b30;
      opacity: 0; transition: opacity 0.2s;
    }

    .error-msg.visible { opacity: 1; }

    .btn-cta {
      position: absolute;
      bottom: 58px; left: 50%;
      transform: translateX(-50%);
      width: 328px; height: 52px;
      background: #00c853; border: none; border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
      color: #000; cursor: pointer;
      box-shadow: 0 4px 5.5px rgba(0,0,0,0.25);
      transition: opacity 0.15s, transform 0.1s;
      opacity: 0.4; pointer-events: none;
    }

    .btn-cta.ready { opacity: 1; pointer-events: all; }
    .btn-cta:active { transform: translateX(-50%) scale(0.98); }

    /* ── Recomeçar fluxo ── */
    .restart-btn {
      font-family: 'Inter', sans-serif; font-size: 13px;
      color: #727272; background: none; border: none;
      cursor: pointer; letter-spacing: -0.2px;
      transition: color 0.15s;
    }

    .restart-btn:hover { color: #fff; }

    @media (max-width: 500px) {
      body { background: #000; padding: 0; gap: 0; }
      .phone-frame { width: 100%; height: 100vh; border-radius: 0; box-shadow: none; }
      .restart-btn { display: none; }
    }
  </style>
</head>
<body>

  <button class="restart-btn" onclick="restart()">← Recomeçar fluxo</button>

  <div class="phone-frame">

    <!-- ══════════════ SPLASH ══════════════ -->
    <div class="screen active" id="splash">
      <img
        class="splash-logo"
        src="https://www.figma.com/api/mcp/asset/fa1df47a-e7a5-47dd-8516-aa84814ce94f"
        alt="Satsails"
      />
    </div>

    <!-- ══════════════ LOGIN ══════════════ -->
    <div class="screen" id="login">
      <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons">
          <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
            <rect x="0"    y="7"   width="3" height="5"    rx="0.5" fill="white"/>
            <rect x="4.5"  y="5"   width="3" height="7"    rx="0.5" fill="white"/>
            <rect x="9"    y="2.5" width="3" height="9.5"  rx="0.5" fill="white"/>
            <rect x="13.5" y="0"   width="3" height="12"   rx="0.5" fill="white" opacity="0.35"/>
          </svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z" fill="white"/>
            <path d="M8 6.5c1.657 0 3.143.69 4.218 1.782L13.28 7.22A7.46 7.46 0 0 0 8 5a7.46 7.46 0 0 0-5.28 2.22l1.062 1.062A5.46 5.46 0 0 1 8 6.5z" fill="white"/>
            <path d="M8 3c2.756 0 5.243 1.06 7.1 2.82l1.04-1.04A10.46 10.46 0 0 0 8 1.5 10.46 10.46 0 0 0-.14 4.78L.9 5.82A8.46 8.46 0 0 1 8 3z" fill="white" opacity="0.5"/>
          </svg>
          <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
            <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" stroke-opacity="0.35"/>
            <rect x="22.5" y="3.5" width="1" height="5" rx="0.5" fill="white" fill-opacity="0.4"/>
            <rect x="2" y="2" width="17" height="8" rx="2" fill="white"/>
          </svg>
        </div>
      </div>
      <div class="hero-image"></div>
      <div class="login-content">
        <div class="login-section">
          <div class="text-section">
            <h1 class="headline">Seja soberano com a Satsails</h1>
            <p class="subtitle">Gerencie Bitcoin e stablecoins sem depender de ninguém.</p>
          </div>
          <div class="buttons-container">
            <button class="btn btn-primary" onclick="goTo('login','criar-pin')">Criar carteira</button>
            <button class="btn btn-secondary">Recuperar carteira</button>
          </div>
        </div>
        <p class="terms-text">
          Ao continuar, você concorda com nossos
          <strong>Termos de Uso</strong> e
          <strong>Política de Privacidade</strong>.
        </p>
      </div>
    </div>

    <!-- ══════════════ CRIAR PIN ══════════════ -->
    <div class="screen" id="criar-pin">
      <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons">
          <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
            <rect x="0" y="7" width="3" height="5" rx="0.5" fill="white"/>
            <rect x="4.5" y="5" width="3" height="7" rx="0.5" fill="white"/>
            <rect x="9" y="2.5" width="3" height="9.5" rx="0.5" fill="white"/>
            <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="white" opacity="0.35"/>
          </svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z" fill="white"/>
            <path d="M8 6.5c1.657 0 3.143.69 4.218 1.782L13.28 7.22A7.46 7.46 0 0 0 8 5a7.46 7.46 0 0 0-5.28 2.22l1.062 1.062A5.46 5.46 0 0 1 8 6.5z" fill="white"/>
            <path d="M8 3c2.756 0 5.243 1.06 7.1 2.82l1.04-1.04A10.46 10.46 0 0 0 8 1.5 10.46 10.46 0 0 0-.14 4.78L.9 5.82A8.46 8.46 0 0 1 8 3z" fill="white" opacity="0.5"/>
          </svg>
          <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
            <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" stroke-opacity="0.35"/>
            <rect x="22.5" y="3.5" width="1" height="5" rx="0.5" fill="white" fill-opacity="0.4"/>
            <rect x="2" y="2" width="17" height="8" rx="2" fill="white"/>
          </svg>
        </div>
      </div>
      <div class="nav-title-bar">
        <h2>Criar PIN</h2>
      </div>
      <div class="pin-main">
        <div class="pin-dots" id="dots1">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="numpad">
          <div class="numpad-row">
            <button class="key" onclick="pinKey(1,'1')"><span>1</span></button>
            <button class="key" onclick="pinKey(1,'2')"><span>2</span></button>
            <button class="key" onclick="pinKey(1,'3')"><span>3</span></button>
          </div>
          <div class="numpad-row">
            <button class="key" onclick="pinKey(1,'4')"><span>4</span></button>
            <button class="key" onclick="pinKey(1,'5')"><span>5</span></button>
            <button class="key" onclick="pinKey(1,'6')"><span>6</span></button>
          </div>
          <div class="numpad-row">
            <button class="key" onclick="pinKey(1,'7')"><span>7</span></button>
            <button class="key" onclick="pinKey(1,'8')"><span>8</span></button>
            <button class="key" onclick="pinKey(1,'9')"><span>9</span></button>
          </div>
          <div class="numpad-row">
            <button class="key" onclick=""><img src="https://www.figma.com/api/mcp/asset/51cf1b42-abe9-4642-84b2-caf3c957b13e" alt="bio"/></button>
            <button class="key" onclick="pinKey(1,'0')"><span>0</span></button>
            <button class="key" onclick="pinDel(1)">
              <svg width="18" height="14" viewBox="0 0 24 18" fill="none">
                <path d="M9 1L1 9l8 8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M1 9h22" stroke="white" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <button class="btn-cta" id="btn1" onclick="goTo('criar-pin','confirmar-pin')">Próximo</button>
    </div>

    <!-- ══════════════ CONFIRMAR PIN ══════════════ -->
    <div class="screen" id="confirmar-pin">
      <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons">
          <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
            <rect x="0" y="7" width="3" height="5" rx="0.5" fill="white"/>
            <rect x="4.5" y="5" width="3" height="7" rx="0.5" fill="white"/>
            <rect x="9" y="2.5" width="3" height="9.5" rx="0.5" fill="white"/>
            <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="white" opacity="0.35"/>
          </svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z" fill="white"/>
            <path d="M8 6.5c1.657 0 3.143.69 4.218 1.782L13.28 7.22A7.46 7.46 0 0 0 8 5a7.46 7.46 0 0 0-5.28 2.22l1.062 1.062A5.46 5.46 0 0 1 8 6.5z" fill="white"/>
            <path d="M8 3c2.756 0 5.243 1.06 7.1 2.82l1.04-1.04A10.46 10.46 0 0 0 8 1.5 10.46 10.46 0 0 0-.14 4.78L.9 5.82A8.46 8.46 0 0 1 8 3z" fill="white" opacity="0.5"/>
          </svg>
          <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
            <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" stroke-opacity="0.35"/>
            <rect x="22.5" y="3.5" width="1" height="5" rx="0.5" fill="white" fill-opacity="0.4"/>
            <rect x="2" y="2" width="17" height="8" rx="2" fill="white"/>
          </svg>
        </div>
      </div>
      <div class="nav-title-bar">
        <button class="back-btn" onclick="goBack('confirmar-pin','criar-pin')">
          <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
            <path d="M9 1L1 9l8 8" stroke="#fafdfe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <h2>Confirmar o seu PIN</h2>
      </div>
      <p class="error-msg" id="errMsg">PINs não coincidem. Tente novamente.</p>
      <div class="pin-main">
        <div class="pin-dots" id="dots2">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="numpad">
          <div class="numpad-row">
            <button class="key" onclick="pinKey(2,'1')"><span>1</span></button>
            <button class="key" onclick="pinKey(2,'2')"><span>2</span></button>
            <button class="key" onclick="pinKey(2,'3')"><span>3</span></button>
          </div>
          <div class="numpad-row">
            <button class="key" onclick="pinKey(2,'4')"><span>4</span></button>
            <button class="key" onclick="pinKey(2,'5')"><span>5</span></button>
            <button class="key" onclick="pinKey(2,'6')"><span>6</span></button>
          </div>
          <div class="numpad-row">
            <button class="key" onclick="pinKey(2,'7')"><span>7</span></button>
            <button class="key" onclick="pinKey(2,'8')"><span>8</span></button>
            <button class="key" onclick="pinKey(2,'9')"><span>9</span></button>
          </div>
          <div class="numpad-row">
            <button class="key" onclick=""><img src="https://www.figma.com/api/mcp/asset/fd3467bd-ea1d-4e61-81ee-d9da1b3415b9" alt="bio"/></button>
            <button class="key" onclick="pinKey(2,'0')"><span>0</span></button>
            <button class="key" onclick="pinDel(2)">
              <svg width="18" height="14" viewBox="0 0 24 18" fill="none">
                <path d="M9 1L1 9l8 8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M1 9h22" stroke="white" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <button class="btn-cta" id="btn2" onclick="confirmPin()">Definir PIN</button>
    </div>

  </div><!-- /phone-frame -->

  <script>
    /* ── Navegação ── */
    function goTo(fromId, toId) {
      const from = document.getElementById(fromId);
      const to   = document.getElementById(toId);
      to.classList.add('active');
      from.classList.add('exit-left');
      setTimeout(() => from.classList.remove('active', 'exit-left'), 400);
    }

    function goBack(fromId, toId) {
      const from = document.getElementById(fromId);
      const to   = document.getElementById(toId);
      to.style.transition = 'none';
      to.style.transform  = 'translateX(-28%)';
      to.classList.add('active');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          to.style.transition = '';
          to.style.transform  = '';
          from.style.transform = 'translateX(100%)';
        });
      });
      setTimeout(() => {
        from.classList.remove('active');
        from.style.transform = '';
        resetPin(2);
      }, 400);
    }

    function restart() {
      ['login','criar-pin','confirmar-pin'].forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove('active','exit-left');
        el.style.transform = '';
      });
      resetPin(1);
      resetPin(2);
      const splash = document.getElementById('splash');
      splash.classList.add('active');
      splash.querySelector('img').style.animation = 'none';
      requestAnimationFrame(() => {
        splash.querySelector('img').style.animation = '';
      });
      startSplash();
    }

    /* ── Splash auto-redirect ── */
    function startSplash() {
      setTimeout(() => goTo('splash', 'login'), 2200);
    }

    startSplash();

    /* ── PIN logic ── */
    const pins = { 1: [], 2: [] };

    function updateDots(n) {
      const dots = document.getElementById('dots' + n).querySelectorAll('.dot');
      dots.forEach((d, i) => {
        d.classList.toggle('filled', i < pins[n].length);
        d.classList.remove('error');
      });
      const btn = document.getElementById('btn' + n);
      btn.classList.toggle('ready', pins[n].length === 6);
      if (n === 2) document.getElementById('errMsg').classList.remove('visible');
    }

    function pinKey(n, digit) {
      if (pins[n].length < 6) { pins[n].push(digit); updateDots(n); }
    }

    function pinDel(n) {
      if (pins[n].length > 0) { pins[n].pop(); updateDots(n); }
    }

    function resetPin(n) {
      pins[n] = [];
      updateDots(n);
    }

    function confirmPin() {
      if (pins[2].length !== 6) return;
      if (pins[1].join('') !== pins[2].join('')) {
        const dots = document.getElementById('dots2').querySelectorAll('.dot');
        dots.forEach(d => { d.classList.remove('filled'); d.classList.add('error'); });
        document.getElementById('errMsg').classList.add('visible');
        pins[2] = [];
        document.getElementById('btn2').classList.remove('ready');
        return;
      }
      alert('PIN definido com sucesso!');
    }
  </script>

</body>
</html>
