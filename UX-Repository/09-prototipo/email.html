<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Satsails — Email</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      min-height: 100vh;
      padding: 32px 0;
      font-family: 'Inter', sans-serif;
    }

    .phone-frame {
      width: 390px;
      height: 844px;
      background: #0c0b0d;
      border-radius: 30px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 2px #2a2a2a, 0 40px 80px rgba(0,0,0,0.8);
    }

    /* Status bar */
    .status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px 0;
      z-index: 10;
    }
    .status-time { font-size: 15px; font-weight: 500; color: #fff; letter-spacing: -0.3px; }
    .status-icons { display: flex; align-items: center; gap: 6px; }

    /* "Conta Individual" badge */
    .account-label {
      position: absolute;
      top: 92px;
      left: 0; right: 0;
      transform: translateY(-50%);
      text-align: center;
      font-size: 13px;
      font-weight: 400;
      color: #d1d2d2;
      line-height: 1.2;
    }

    /* Center container — vertically centered in the frame */
    .center-container {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 328px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 28px;
    }

    .icon-text-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      width: 100%;
      text-align: center;
    }

    .email-title {
      font-size: 48px;
      font-weight: 500;
      color: #ffffff;
      line-height: normal;
    }

    .email-subtitle {
      font-size: 16px;
      font-weight: 300;
      color: #727272;
      line-height: normal;
      width: 274px;
    }

    /* Input */
    .input-container {
      background: #000000;
      border: 1px solid #000000;
      border-radius: 8px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 20px;
      width: 100%;
    }

    .input-field {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #ffffff;
      min-width: 0;
    }
    .input-field::placeholder { color: #333333; }

    /* Continuar button */
    .btn-continuar {
      position: absolute;
      bottom: 58px;
      left: 50%;
      transform: translateX(-50%);
      width: 328px;
      height: 52px;
      background: #FF9800;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #000000;
      cursor: pointer;
      box-shadow: 0px 4px 5.5px rgba(0,0,0,0.25);
      transition: opacity 0.15s ease, transform 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-continuar:active {
      opacity: 0.85;
      transform: translateX(-50%) scale(0.98);
    }

    @media (max-width: 500px) {
      body { background: #0c0b0d; align-items: flex-start; padding: 0; }
      .phone-frame { width: 100%; height: 100vh; border-radius: 0; box-shadow: none; }
    }
  </style>
</head>
<body>

  <a href="login.html" style="font-family:'Inter',sans-serif;font-size:13px;font-weight:400;color:#727272;text-decoration:none;letter-spacing:-0.2px;transition:color 0.15s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#727272'">
    ← Voltar
  </a>

  <div class="phone-frame">

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0"    y="7"   width="3" height="5"    rx="0.5" fill="white"/>
          <rect x="4.5"  y="5"   width="3" height="7"    rx="0.5" fill="white"/>
          <rect x="9"    y="2.5" width="3" height="9.5"  rx="0.5" fill="white"/>
          <rect x="13.5" y="0"   width="3" height="12"   rx="0.5" fill="white" opacity="0.35"/>
        </svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="11" r="1.5" fill="white"/>
          <path d="M4.5 8.3C5.4 7.3 6.6 6.7 8 6.7s2.6.6 3.5 1.6" stroke="white" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          <path d="M1.5 5.5C3.1 3.8 5.4 2.7 8 2.7s4.9 1.1 6.5 2.8" stroke="white" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.5"/>
        </svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" stroke-opacity="0.35"/>
          <rect x="22.5" y="3.5" width="1" height="5" rx="0.5" fill="white" fill-opacity="0.4"/>
          <rect x="2" y="2" width="17" height="8" rx="2" fill="white"/>
        </svg>
      </div>
    </div>

    <!-- Conta Individual label -->
    <div class="account-label">Conta Individual</div>

    <!-- Center container -->
    <div class="center-container">

      <!-- Icon + text -->
      <div class="icon-text-group">
        <!-- Email envelope icon -->
        <svg width="54" height="54" viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 18h36v20c0 1.105-.895 2-2 2H11c-1.105 0-2-.895-2-2V18z" stroke="white" stroke-width="2"/>
          <path d="M9 18l18 14 18-14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <p class="email-title">Email</p>
        <p class="email-subtitle">Você receberá um código único para validar cada operação e manter o controle total da sua conta.</p>
      </div>

      <!-- Email input -->
      <div class="input-container">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 5.5h12v8c0 .553-.447 1-1 1H4c-.553 0-1-.447-1-1v-8z" stroke="#555" stroke-width="1.2"/>
          <path d="M3 5.5l6 4.5 6-4.5" stroke="#555" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <input
          type="email"
          class="input-field"
          placeholder="Digite seu melhor e-mail *"
          autocomplete="email"
        />
      </div>

    </div>

    <!-- Continuar button -->
    <button class="btn-continuar" onclick="handleContinuar()">Continuar</button>

  </div>

  <script>
    function handleContinuar() {
      const input = document.querySelector('.input-field');
      if (input.value && input.value.includes('@')) {
        window.location.href = 'criar-pin.html';
      } else {
        input.style.borderColor = '#CF1C0E';
        input.closest('.input-container').style.borderColor = '#CF1C0E';
        input.focus();
        setTimeout(() => {
          input.closest('.input-container').style.borderColor = '#000000';
        }, 2000);
      }
    }
  </script>

</body>
</html>
